# Override for Linux hosts with NVIDIA GPU + nvidia-container-toolkit.
# On macOS this file has no effect (Apple Silicon GPU is not exposed to Docker).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility